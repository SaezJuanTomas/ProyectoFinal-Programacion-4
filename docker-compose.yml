services:
  postgres:
    image: postgres:15
    container_name: food_store_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_store_db
    ports:
      - "5432:5432"
    volumes:
      - food_store_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_store_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  food_store_pgdata: